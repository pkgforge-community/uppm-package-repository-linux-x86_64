name: publish

on:
  workflow_dispatch

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        pkg: [aria2, appstream, squashfs, axel, b3sum, base16, base64, bash, bat, bc, bison, bmake, bsdtar, bzip2, cargo-c, cbindgen, cmake, coreutils, cppcheck, ctop, curl, curlie, d2, darkhttpd, desktop-file-utils, difftastic, diffutils, dog, dolt, dos2unix, dot_static, doxygen, dua, duf, dufs, dust, ed, exa, fd, figlet, file, findutils, flex, flock, fzf, gawk, getopt, gettext-tools, gh, gindent, git, git-cliff, git-lfs, gitui, gitwatch, glib-tools, glow, gm4, gmake, gn, gnupg, go-md2man, gogs, gotop, gotty, gperf, grep, gron, grpc-plugins, gsed, gtar, gzip, helm, hugo, incus, invoice, jj, jq, ko, lazygit, lolcat, lsd, lua, lz4, lzip, mediainfo, mosh, mpg123, nap, nasm, ninja, nushell, openssl, orcc, p7zip, patch, patchelf, pigz, pkg-config, pkgconf, pngquant, pop, potrace, proot, putty, qpdf, qrencode, quickjs, ragel, re2c, ripgrep, rsync, rtmpdump, sassc, scdoc, silicon, sqlite3, starship, strace, svn-lite, swig, sysinfo, t1utils, tcpdump, tealdeer, tic, tig, tmux, tree, trietool, uctags, unrar, unzip, update-mime-database, uppm, util-linux, uutils-coreutils, volta, wabt, wget, xmake, xmlutils, xsltproc, xxd, xz, yasm, youtubedr, yq, zip, zopfli, zoxide, zstd, zsync, pngutils, tiffutils, webputils]

    runs-on: ubuntu-latest

    container: alpine

    steps:
      - run: apk update
      - run: apk add curl g++ libc-dev linux-headers

      - run: curl -LO https://raw.githubusercontent.com/leleliu008/ppkg/master/ppkg
      - run: chmod a+x ppkg

      - run: ./ppkg setup
      - run: ./ppkg update
      - run: ./ppkg install ${{ matrix.pkg }} --static
      - run: ./ppkg bundle  ${{ matrix.pkg }} .tar.xz --exclude include/ --exclude lib/

      - name: create ${{ matrix.pkg }}.yml
        run: |
          PACKAGE_SUMMARY="$(./ppkg show ${{ matrix.pkg }} summary)"
          PACKAGE_WEB_URL="$(./ppkg show ${{ matrix.pkg }} web-url)"
          PACKAGE_VERSION="$(./ppkg show ${{ matrix.pkg }} version)"

          PACKAGE_BIN_SHA="$(sha256sum *.tar.xz | cut -d ' ' -f1)"

          PACKAGE_BIN_URL="https://github.com/leleliu008/uppm-package-repository-linux-x86_64/releases/download/@TAGNAME@/$(ls *.tar.xz)"

          cat > ${{ matrix.pkg }}.yml <<EOF
          summary: $PACKAGE_SUMMARY
          webpage: $PACKAGE_WEB_URL
          version: $PACKAGE_VERSION
          bin-url: $PACKAGE_BIN_URL
          bin-sha: $PACKAGE_BIN_SHA
          EOF

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.pkg }}
          path: |
            ${{ matrix.pkg }}-*.tar.xz
            ${{ matrix.pkg }}.yml

  publish:
    needs: build
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: '*'
          path: .
          merge-multiple: true

      - run: ls

      - run: |
          set -ex

          TAGNAME="$(date +%Y.%m.%d)"

          sed -i "s|@TAGNAME@|$TAGNAME|" *.yml

          mv *.yml formula/

          DIRNAME="uppm-formula-repository-linux-x86_64-$TAGNAME"

          install -d "$DIRNAME"

          cp -r formula "$DIRNAME/"

          tar cvJf "$DIRNAME.tar.xz" "$DIRNAME"

          cat > notes.md <<EOF
          These packages are created by [ppkg](https://github.com/leleliu008/ppkg).

          These packages are statically linked against [musl-libc](https://musl.libc.org/).

          These packages are relocatable which means that you can install them to anywhere.
          EOF

          gh release create "$TAGNAME" *.tar.xz --title "$TAGNAME" --notes-file notes.md

          git config --global user.name  leleliu008
          git config --global user.email leleliu008@gmail.com

          git pull

          git add formula
          git commit -m "release new version $TAGNAME"
          git push origin master
